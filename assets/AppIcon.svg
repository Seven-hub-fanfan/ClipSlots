<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGrad" x1="4" y1="4" x2="1020" y2="1020" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C8CFF"/>
      <stop offset="0.52" stop-color="#5E7CFF"/>
      <stop offset="1" stop-color="#8B5CFF"/>
    </linearGradient>
  </defs>

  <!-- Full-size brand rounded rect — no border, no extra ring -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#brandGrad)"/>

  <!-- rectangle.stack.fill: three stacked white cards -->
  <rect x="400" y="560" width="224" height="152" rx="36" fill="white" fill-opacity="0.24"/>
  <rect x="380" y="476" width="264" height="152" rx="40" fill="white" fill-opacity="0.64"/>
  <rect x="360" y="392" width="304" height="152" rx="44" fill="white"/>

  <!-- Slot lines on top card -->
  <rect x="410" y="436" width="120" height="18" rx="9" fill="#DDE5FF"/>
  <rect x="410" y="474" width="156" height="18" rx="9" fill="#DDE5FF" opacity="0.55"/>
  <rect x="410" y="512" width="84" height="18" rx="9" fill="#DDE5FF" opacity="0.3"/>

  <!-- Slot dots -->
  <circle cx="394" cy="445" r="8" fill="#8B5CFF"/>
  <circle cx="394" cy="483" r="8" fill="#7C8CFF"/>
  <circle cx="394" cy="521" r="8" fill="#8B5CFF" opacity="0.6"/>
</svg>
