<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6B80FF"/>
      <stop offset="1" stop-color="#8F5CFF"/>
    </linearGradient>
  </defs>

  <!-- Brand gradient rounded rect — full canvas -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#brand)"/>

  <!-- rectangle.stack.fill symbol — proportionally sized to match 20pt in 44pt box (~45% width) -->
  <g transform="translate(512,512)">
    <!-- Bottom card (offset right) -->
    <rect x="-180" y="20" width="340" height="200" rx="44" fill="white" fill-opacity="0.24"/>
    <!-- Middle card (slight offset right) -->
    <rect x="-210" y="-60" width="400" height="200" rx="48" fill="white" fill-opacity="0.62"/>
    <!-- Top card (centered) -->
    <rect x="-240" y="-140" width="480" height="200" rx="52" fill="white"/>

    <!-- Top card slot lines -->
    <rect x="-170" y="-90" width="180" height="22" rx="11" fill="#DDE5FF"/>
    <rect x="-170" y="-50" width="220" height="22" rx="11" fill="#DDE5FF" opacity="0.52"/>
    <rect x="-170" y="-10" width="130" height="22" rx="11" fill="#DDE5FF" opacity="0.28"/>

    <!-- Top card slot dots -->
    <circle cx="-195" cy="-79" r="10" fill="#8B5CFF"/>
    <circle cx="-195" cy="-39" r="10" fill="#7C8CFF"/>
    <circle cx="-195" cy="1" r="10" fill="#8B5CFF" opacity="0.55"/>
  </g>
</svg>
