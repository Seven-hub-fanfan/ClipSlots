<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="darkBg" x1="128" y1="96" x2="896" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D2233"/>
      <stop offset="0.48" stop-color="#121625"/>
      <stop offset="1" stop-color="#090B12"/>
    </linearGradient>
    <linearGradient id="brand" x1="290" y1="250" x2="760" y2="790" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7B8CFF"/>
      <stop offset="0.45" stop-color="#636CFF"/>
      <stop offset="1" stop-color="#8B5CFF"/>
    </linearGradient>
    <linearGradient id="highlight" x1="310" y1="250" x2="690" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0.48"/>
      <stop offset="0.55" stop-color="white" stop-opacity="0.12"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="paper" x1="370" y1="330" x2="650" y2="710" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF0FF"/>
    </linearGradient>
    <filter id="mainShadow" x="150" y="150" width="724" height="724" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="38" stdDeviation="44" flood-color="#000000" flood-opacity="0.48"/>
      <feDropShadow dx="0" dy="0" stdDeviation="36" flood-color="#6E7CFF" flood-opacity="0.36"/>
    </filter>
    <filter id="brandGlow" x="180" y="180" width="664" height="664" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="34" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.38   0 0 0 0 0.42   0 0 0 0 1   0 0 0 0.55 0"/>
    </filter>
    <filter id="paperShadow" x="300" y="290" width="424" height="460" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#222A66" flood-opacity="0.26"/>
    </filter>
    <filter id="sparkGlow" x="650" y="210" width="210" height="210" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.65   0 0 0 0 0.70   0 0 0 0 1   0 0 0 0.85 0"/>
    </filter>
  </defs>

  <!-- macOS dark rounded base -->
  <rect x="96" y="96" width="832" height="832" rx="210" fill="url(#darkBg)"/>

  <!-- Background glow -->
  <circle cx="512" cy="500" r="330" fill="#5E7CFF" opacity="0.16" filter="url(#brandGlow)"/>
  <circle cx="330" cy="250" r="190" fill="#7B8CFF" opacity="0.16"/>
  <circle cx="760" cy="770" r="230" fill="#8B5CFF" opacity="0.12"/>

  <!-- Top highlight -->
  <path d="M178 326C226 188 348 134 518 134C724 134 856 244 902 438C828 300 706 234 526 234C360 234 252 266 178 326Z" fill="white" fill-opacity="0.075"/>

  <!-- Main icon rounded rect -->
  <g filter="url(#mainShadow)">
    <rect x="256" y="256" width="512" height="512" rx="118" fill="url(#brand)"/>
    <rect x="256" y="256" width="512" height="512" rx="118" fill="url(#highlight)"/>
  </g>

  <!-- Edge highlight -->
  <rect x="258" y="258" width="508" height="508" rx="116" stroke="white" stroke-opacity="0.18" stroke-width="4"/>

  <!-- Clipboard body -->
  <g filter="url(#paperShadow)">
    <rect x="352" y="366" width="320" height="292" rx="44" fill="url(#paper)"/>
    <rect x="414" y="326" width="196" height="82" rx="41" fill="#F4F6FF"/>
    <rect x="446" y="306" width="132" height="54" rx="27" fill="#DDE5FF"/>
    <rect x="446" y="306" width="132" height="54" rx="27" fill="#BFCBFF" fill-opacity="0.38"/>
  </g>

  <!-- Paper top covers clip bottom -->
  <rect x="352" y="386" width="320" height="272" rx="44" fill="url(#paper)"/>

  <!-- Slot lines -->
  <rect x="418" y="454" width="188" height="26" rx="13" fill="#6670FF" fill-opacity="0.88"/>
  <rect x="418" y="512" width="164" height="26" rx="13" fill="#6670FF" fill-opacity="0.62"/>
  <rect x="418" y="570" width="208" height="26" rx="13" fill="#6670FF" fill-opacity="0.42"/>

  <!-- Slot dots -->
  <circle cx="386" cy="467" r="12" fill="#6670FF"/>
  <circle cx="386" cy="525" r="12" fill="#8B5CFF"/>
  <circle cx="386" cy="583" r="12" fill="#6670FF" fill-opacity="0.72"/>

  <!-- Sparkle top right -->
  <g filter="url(#sparkGlow)">
    <path d="M730 228L748 274L794 292L748 310L730 356L712 310L666 292L712 274L730 228Z" fill="#DDE5FF" fill-opacity="0.86"/>
  </g>

  <!-- Small light particles -->
  <circle cx="690" cy="692" r="10" fill="white" fill-opacity="0.22"/>
  <circle cx="724" cy="650" r="6" fill="white" fill-opacity="0.18"/>
  <circle cx="320" cy="318" r="8" fill="white" fill-opacity="0.20"/>
</svg>
